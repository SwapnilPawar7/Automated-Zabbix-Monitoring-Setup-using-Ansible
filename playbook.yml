- name: Configure and register hosts in Zabbix
  hosts: linux_servers
  become: yes

  roles:
    - zabbix-agent

- name: Register hosts in Zabbix via API
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    ansible_connection: httpapi
    ansible_network_os: community.zabbix.zabbix
    ansible_httpapi_port: 80
    ansible_httpapi_use_ssl: false
    ansible_host: "35.154.219.63"
    ansible_user: "Admin"
    ansible_password: "zabbix"

  tasks:
    - name: Create host in Zabbix
      community.zabbix.zabbix_host:
        host_name: "{{ item }}"
        visible_name: "{{ item }}"
        host_groups:
          - "Linux servers"
        link_templates:
          - "Linux by Zabbix agent"
        interfaces:
          - type: agent
            main: 1
            useip: 1
            ip: "{{ hostvars[item].ansible_host }}"
            port: "10050"
        state: present
      loop: "{{ groups['linux_servers'] }}"
